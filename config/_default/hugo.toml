theme = "blowfish"
defaultContentLanguage = "cs"
title = "NEO HWARANG - tanec, soutěže a láska ke K-popu"
description = "Tuto stránku jsem vytvořil jako místo, kde můžu sdílet svou cestu, chyby i úspěchy. Jsem rád, že jsi tady."

baseURL = "https://tvuj-aktualni-link.kpop-mirek.pages.dev/"   # ← VEČER SEM NAPÍŠEŠ AKTUALNÍ URL Z CLOUDFLARE

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
enableEmoji = true

[pagination]
  pagerSize = 100

[imaging]
  anchor = 'Center'

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS", "JSON"]

# ==================== BLOWFISH PARAMS ====================
[params]
    colorScheme = "blowfish"
    defaultAppearance = "dark"
    showText = true
    description = "Tuto stránku jsem vytvořil jako místo, kde můžu sdílet svou cestu, chyby i úspěchy. Jsem rád, že jsi tady."

    # Důležité pro background layout
    [params.homepage]
        layout = "background"

    # Custom CSS - toto je klíčové
    [params.assets]
        customCSS = ["css/custom.css"]

    # Další nastavení
    article = { showAuthor = false, showAuthorsBadges = false, showAuthorBottom = false }
    customCursor = true
    mainSections = ["o-mne", "souteze", "foto", "video", "kontakt"]