baseURL = "https://9e14e5e2.kpop-mirek.pages.dev/"
theme = "blowfish"
defaultContentLanguage = "cs"
title = "NEO HWARANG"

[params]
    colorScheme = "blowfish"
    defaultAppearance = "dark"
    showText = true
    description = "Tuto stránku jsem vytvořil jako místo, kde můžu sdílet svou cestu, chyby i úspěchy."
    # Tady natvrdo vypínáme ty problematické autory:
    article = { showAuthor = false, showAuthorsBadges = false, showAuthorBottom = false }
    customCursor = true
    mainSections = ["o-mne", "souteze", "foto", "video", "kontakt"]
    customCSS = ["css/custom.css"]

[taxonomies]
    tag = "tags"
    category = "categories"

[build]
    writeStats = true