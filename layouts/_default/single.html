{{ define "main" }}
  {{ if .Params.layout | eq "background" }}
    {{ partial "home/background.html" . }}
  {{ else }}
    <article class="max-w-prose mx-auto py-12 px-6">
      <h1 class="text-4xl font-extrabold">{{ .Title }}</h1>
      <div class="prose dark:prose-invert mt-8">{{ .Content }}</div>
    </article>
  {{ end }}
{{ end }}
